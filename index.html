<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Enhanced - Infinite Voxel Sandbox</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:'Segoe UI', Arial, sans-serif; }
canvas { display:block; }
#ui {
    position:absolute; color:white; padding: 0;
    pointer-events:none; z-index:10; user-select:none;
    width: 100%; height: 100%; top: 0; left: 0;
}
#info { position: absolute; top:12px; left: 12px; font-size:13px; background:rgba(15,15,15,0.85); padding: 10px 16px; border-radius:6px; border: 1px solid #444; line-height: 1.4; }
#dimInfo { position: absolute; top: 12px; right: 12px; color:#55ffff; font-size: 16px; font-weight:bold; background:rgba(15,15,15,0.85); padding: 10px 16px; border-radius:6px; border: 1px solid #444; }
#crosshair { position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:24px; pointer-events:none; color: rgba(255,255,255,0.8); font-weight: 300; }
#instructions { position: absolute; bottom: 135px; left:50%; transform:translateX(-50%); font-size:13px; text-align:center; background:rgba(0,0,0,0.8); padding: 6px 14px; border-radius:4px; border: 1px solid #333; animation: pulse 2s infinite; }
#stats-panel { position: absolute; bottom:95px; left:50%; transform: translateX(-50%); display: flex; gap: 30px; font-size: 15px; font-weight: bold; background:rgba(15,15,15,0.85); padding: 8px 18px; border-radius: 6px; border: 1px solid #444; }
#health { color:#ff3333; text-shadow: 0 0 4px rgba(255,0,0,0.5); }
#hunger { color:#ff9922; text-shadow: 0 0 4px rgba(255,150,0,0.5); }
#break-progress-bar { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 6px; background: rgba(0,0,0,0.5); border: 1px solid #fff; display: none; border-radius: 3px; overflow: hidden; }
#break-progress-fill { width: 0%; height: 100%; background: #ffff00; }
#hotbar-container {
    position:absolute; bottom:15px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction: column; align-items: center; gap: 4px;
}
#block-name-display { color: #fff; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px #000; min-height: 18px; }
#hotbar {
    display:flex; gap:6px; background:rgba(20,20,20,0.9); padding:6px; border-radius:6px;
    pointer-events:none; border: 2px solid #444;
}
.slot {
    width: 48px; height: 48px; display: flex; flex-direction: column;
    justify-content: center; align-items: center; font-size: 11px;
    background: #3a3a3a; border: 2px solid #2e2e2e; border-radius: 4px; position: relative;
    box-sizing: border-box;
}
.slot.active { border-color: #ffffff; background: #5c5c5c; box-shadow: inset 0 0 4px #fff, 0 0 10px rgba(255,255,255,0.4); }
.slot-icon { width: 24px; height: 24px; border-radius: 2px; margin-bottom: 2px; }
.count { position: absolute; bottom: 2px; right: 5px; font-size: 11px; color: #fff; font-weight: bold; text-shadow: 1px 1px 1px #000; }
@keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
</style>
</head>
<body>

<div id="ui">
    <div id="info">
        <strong>CONTROLS:</strong><br>
        • WASD: Move | Space: Jump<br>

        • RMB: Place Block / Interact<br>

    <div id="dimInfo">Dimension: Overworld</div>

    <div id="break-progress-bar"><div id="break-progress-fill"></div></div>

    <div id="stats-panel">
        <div id="health">HP: ❤❤❤❤❤❤❤❤❤❤</div>
        <div id="hunger">HUNGER: 🍗🍗🍗🍗🍗🍗🍗🍗🍗🍗</div>
    </div>

    <div id="hotbar-container">
        <div id="block-name-display"></div>
        <div id="hotbar"></div>
    </div>
</div>

// =============== BLOCK REGISTRY SYSTEM (Dynamic Core Engine) ===============

    { id: 'dandelion', name: 'Dandelion', category: 'plant', hex: '#ffec45', noise: 30, hardness: 0.0, transparent: true },
    { id: 'oak_sapling', name: 'Oak Sapling', category: 'plant', hex: '#45a012', noise: 20, hardness: 0.0, transparent: true },
    { id: 'moss_block', name: 'Moss Block', category: 'plant', hex: '#4a6828', noise: 15, hardness: 0.5 },
    { id: 'vines', name: 'Vines', category: 'plant', hex: '#2f4916', noise: 10, hardness: 0.2, transparent: true },
    
    { id: 'water', name: 'Water Block', category: 'liquid', hex: '#3f76e4', noise: 10, hardness: 100.0, transparent: true, opacity: 0.6 },
    { id: 'lava', name: 'Lava Block', category: 'liquid', hex: '#ed5e11', noise: 30, hardness: 100.0, emissive: 0.8 },
    
    { id: 'torch', name: 'Torch', category: 'lighting', hex: '#ffa500', noise: 35, hardness: 0.0, emissive: 0.9 },
    { id: 'lantern', name: 'Lantern', category: 'lighting', hex: '#444444', noise: 15, hardness: 3.5, emissive: 0.8 },
    { id: 'sea_lantern', name: 'Sea Lantern', category: 'lighting', hex: '#b1ccc6', noise: 8, hardness: 0.3, emissive: 0.7 },
    { id: 'glowstone', name: 'Glowstone', category: 'lighting', hex: '#ccaa55', noise: 40, hardness: 0.3, emissive: 0.8 }
];

// Initialize Block Registry and generate 1,100 distinct block states programmatically
let blockIndexCount = 0;
baseBlocksData.forEach(base => {
    BLOCK_REGISTRY[base.id] = base;
    blockIndexCount++;
});

// Generate 1100 Programmatic Distinct Variants
const colorModifiers = ['Light', 'Dark', 'Raw', 'Smooth', 'Chiseled', 'Polished', 'Weathered', 'Oxidized', 'Cracked', 'Mossy', 'Infested', 'Reinforced'];
let modIndex = 0;
while (blockIndexCount < 1100) {
    const parent = baseBlocksData[modIndex % baseBlocksData.length];
    const mod = colorModifiers[Math.floor(blockIndexCount / baseBlocksData.length) % colorModifiers.length];
    const uniqueId = `${parent.id}_variant_${blockIndexCount}`;
    
    // Shift color hex structurally
    let r = Math.min(255, Math.max(20, parseInt(parent.hex.slice(1,3), 16) + (blockIndexCount % 40) - 20));
    let g = Math.min(255, Math.max(20, parseInt(parent.hex.slice(3,5), 16) + (blockIndexCount % 30) - 15));
    let b = Math.min(255, Math.max(20, parseInt(parent.hex.slice(5,7), 16) + (blockIndexCount % 50) - 25));
    const generatedHex = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
    
    BLOCK_REGISTRY[uniqueId] = {
        id: uniqueId,
        name: `${mod} ${parent.name}`,
        category: parent.category,
        hex: generatedHex,
        noise: Math.min(45, parent.noise + 5),
        hardness: parent.hardness,
        emissive: parent.emissive || 0,
        transparent: parent.transparent || false,
        opacity: parent.opacity || 1.0
    };
    blockIndexCount++;
    modIndex++;
}

// Global Textures Lookup Map
const textures = {};
function buildVoxelTexture(blockData) {
    const canvas = document.createElement('canvas');
    canvas.width = 16; canvas.height = 16;
    const ctx = canvas.getContext('2d');
    const baseColor = blockData.hex;
    ctx.fillStyle = baseColor;
    ctx.fillRect(0, 0, 16, 16);
    
    const r = parseInt(baseColor.slice(1,3), 16);
    const g = parseInt(baseColor.slice(3,5), 16);
    const b = parseInt(baseColor.slice(5,7), 16);
    const noiseVal = blockData.noise || 15;

    for (let x = 0; x < 16; x++) {
        for (let y = 0; y < 16; y++) {
            const offset = (Math.random() - 0.5) * noiseVal;
            ctx.fillStyle = `rgb(${Math.min(255, Math.max(0, r + offset))}, ${Math.min(255, Math.max(0, g + offset))}, ${Math.min(255, Math.max(0, b + offset))})`;
            ctx.fillRect(x, y, 1, 1);
        }
    }
    // Form stylized border lines for tiles/bricks/voxels
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(0, 15, 16, 1);
    ctx.fillRect(15, 0, 1, 16);
    
    const tex = new THREE.CanvasTexture(canvas);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    return tex;
}

// Lazy texture building helper
function fetchTexture(id) {
    if (!textures[id]) {
        textures[id] = buildVoxelTexture(BLOCK_REGISTRY[id]);
    }
    return textures[id];
}

// =============== HOTBAR INITIALIZATION ===============
const hotbarSlots = [
    'grass_block', 'cobblestone', 'oak_log', 'oak_planks', 
    'diamond_ore', 'glass', 'crafting_table', 'glowstone', 'lava'
];
let activeSlotIndex = 0;

function generateHotbarUI() {
    const container = document.getElementById('hotbar');
    container.innerHTML = '';
    hotbarSlots.forEach((id, i) => {
        const block = BLOCK_REGISTRY[id];
        const slot = document.createElement('div');
        slot.className = `slot ${i === activeSlotIndex ? 'active' : ''}`;
        slot.id = `slot-${i}`;
        
        const preview = document.createElement('div');
        preview.className = 'slot-icon';
        preview.style.backgroundColor = block.hex;
        preview.style.border = '1px solid rgba(0,0,0,0.4)';
        
        const count = document.createElement('span');
        count.className = 'count';
        count.innerText = '64';
        
        slot.appendChild(preview);
        slot.appendChild(count);
        container.appendChild(slot);
    });
    document.getElementById('block-name-display').innerText = BLOCK_REGISTRY[hotbarSlots[activeSlotIndex]].name;
}

// =============== CORE GRAPHICS ENGINE SETUP ===============
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

let currentDimension = 'overworld';
let health = 10;
let hunger = 10;

// Optimized Voxel Core Mapping
const blocks = new Map();
const blockGeometry = new THREE.BoxGeometry(1, 1, 1);

function createBlockMesh(x, y, z, id) {
    const data = BLOCK_REGISTRY[id] || BLOCK_REGISTRY['stone'];
    const mat = new THREE.MeshLambertMaterial({
        map: fetchTexture(id),
        transparent: data.transparent || false,
        opacity: data.opacity !== undefined ? data.opacity : 1.0,
        emissive: data.emissive ? new THREE.Color(data.hex) : new THREE.Color(0,0,0),
        emissiveIntensity: data.emissive || 0.0
    });
    const mesh = new THREE.Mesh(blockGeometry, mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = !data.transparent;
    mesh.receiveShadow = true;
    mesh.userData = { id: id, hardness: data.hardness };
    
    scene.add(mesh);
    blocks.set(`${x},${y},${z}`, mesh);
    return mesh;
}

// =============== WORLD GENERATION PARAMETERS ===============
function perlinNoise2D(x, z) {
    let v = Math.sin(x * 0.08) * Math.cos(z * 0.08) * 4;
    v += Math.sin(x * 0.02) * Math.sin(z * 0.02) * 9;
    return v;
}

function generateWorld() {
    // Purge old scene assets cleanly
    blocks.forEach(m => scene.remove(m));
    blocks.clear();
    
    if (currentDimension === 'overworld') {
        scene.background = new THREE.Color(0x7ec0ee);
        scene.fog = new THREE.FogExp2(0x7ec0ee, 0.015);
        ambientLight.color.setHex(0xffffff);
        ambientLight.intensity = 0.6;
        
        // Generate Terrain Matrices
        for(let x = -25; x <= 25; x++) {
            for(let z = -25; z <= 25; z++) {
                const height = Math.floor(perlinNoise2D(x, z)) + 4;
                
                // Surface
                createBlockMesh(x, height, z, height > 2 ? 'grass_block' : 'sand');
                
                // Sub-surface Soil layers
                for(let y = height - 1; y >= height - 3; y--) {
                    createBlockMesh(x, y, z, 'dirt');
                }
                // Base Bedrock & Deepslate structures
                for(let y = height - 4; y >= -4; y--) {
                    let randOre = Math.random();
                    let oreType = 'stone';
                    if(randOre < 0.01) oreType = 'diamond_ore';
                    else if(randOre < 0.03) oreType = 'gold_ore';
                    else if(randOre < 0.06) oreType = 'iron_ore';
                    else if(randOre < 0.12) oreType = 'coal_ore';
                    else if(y < -1) oreType = 'deepslate';
                    
                    createBlockMesh(x, y, z, oreType);
                }
            }
        }
    } else if (currentDimension === 'nether') {
        scene.background = new THREE.Color(0x1a0505);
        scene.fog = new THREE.FogExp2(0x1a0505, 0.03);
        ambientLight.color.setHex(0xff5533);
        ambientLight.intensity = 0.5;
        
        for(let x = -20; x <= 20; x++) {
            for(let z = -20; z <= 20; z++) {
                const h = Math.floor(Math.sin(x*0.15) * Math.cos(z*0.15) * 3) - 2;
                createBlockMesh(x, h, z, 'netherrack');
                createBlockMesh(x, h-1, z, 'blackstone');
                if(Math.random() < 0.08) createBlockMesh(x, h+1, z, 'lava');
                else if(Math.random() < 0.02) createBlockMesh(x, h+1, z, 'glowstone');
            }
        }
    } else if (currentDimension === 'the_end') {
        scene.background = new THREE.Color(0x0c0812);
        scene.fog = new THREE.FogExp2(0x0c0812, 0.02);
        ambientLight.color.setHex(0xcc99ff);
        ambientLight.intensity = 0.4;
        
        for(let x = -20; x <= 20; x++) {
            for(let z = -20; z <= 20; z++) {
                if(Math.hypot(x, z) < 18) {
                    const h = Math.floor(Math.sin(x*0.3)*0.5) - 3;
                    createBlockMesh(x, h, z, 'end_stone');
                    if(Math.random() < 0.03) createBlockMesh(x, h+1, z, 'purpur_block');
                }
            }
        }
    }
}

// =============== SOUNDS GENERATOR SYNTH ===============
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playAudioTone(freq, duration, type = 'square', gainEnd = 0.01) {
    try {
        if(audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(gainEnd, audioCtx.currentTime + duration);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e){}
}

// =============== PLAYER CREATION & SETUP ===============
const playerGroup = new THREE.Group();
scene.add(playerGroup);
playerGroup.position.set(0, 12, 0);
let playerVelocityY = 0;

// Ambient/Sunlight systems
const sunLight = new THREE.DirectionalLight
